<!-- First-Run Setup Wizard - Only loaded when needed -->
<div id="setupWizardModal" class="modal setup-modal">
    <div class="modal-content setup-content">
        <!-- Setup Header -->
        <div class="setup-header">
            <div class="setup-logo">
                <div class="setup-icon">🚀</div>
                <div class="setup-text">
                    <h2>Welcome to SolveIT Support</h2>
                    <p>Quick setup to get you started</p>
                </div>
            </div>
        </div>

        <!-- Setup Form -->
        <div class="setup-form">
            <div class="setup-intro">
                <p>Enter your information below - it will be automatically included in all support tickets.</p>
            </div>

            <form id="setupForm">
                <div class="setup-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="setupFirstName" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="setupLastName" placeholder="Smith" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="setupEmail" placeholder="john.smith@company.com" required>
                </div>

                <div class="setup-row">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="setupPhone" placeholder="(555) 123-4567">
                    </div>
                    <div class="form-group">
                        <label>Extension</label>
                        <input type="text" id="setupExtension" placeholder="1234">
                    </div>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <select id="setupDepartment">
                        <option value="">Select Department</option>
                        <option value="Accounting">Accounting</option>
                        <option value="Administration">Administration</option>
                        <option value="Customer Service">Customer Service</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Human Resources">Human Resources</option>
                        <option value="IT">IT</option>
                        <option value="Legal">Legal</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Operations">Operations</option>
                        <option value="Sales">Sales</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="setupJobTitle" placeholder="Account Manager">
                </div>

                <!-- Setup Actions -->
                <div class="setup-actions">
                    <button type="button" class="btn btn-secondary" id="setupSkipBtn">Skip Setup</button>
                    <button type="submit" class="btn btn-primary" id="setupCompleteBtn">Complete Setup</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Setup Wizard Styles -->
<style>
.setup-modal {
    z-index: 10000;
}

.setup-modal .modal-content {
    max-width: 480px;
    width: 90%;
    margin: 5% auto;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.setup-header {
    background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
    padding: 24px;
    color: white;
    text-align: center;
}

.setup-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
}

.setup-icon {
    width: 48px;
    height: 48px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.setup-text h2 {
    font-size: 20px;
    margin-bottom: 4px;
    font-weight: 600;
}

.setup-text p {
    font-size: 13px;
    opacity: 0.9;
}

.setup-form {
    padding: 24px;
    background: white;
}

.setup-intro {
    text-align: center;
    margin-bottom: 24px;
    padding: 16px;
    background: #f8f9fa;
    border-radius: 8px;
    border-left: 4px solid #3498db;
}

.setup-intro p {
    font-size: 13px;
    color: #495057;
    line-height: 1.4;
    margin: 0;
}

.setup-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.setup-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #e9ecef;
}

.setup-actions .btn {
    flex: 1;
    padding: 12px 16px;
    font-weight: 500;
}

/* Setup form validation */
.setup-form .form-group input:invalid {
    border-color: #e74c3c;
}

.setup-form .form-group input:valid {
    border-color: #27ae60;
}

/* Setup completion animation */
.setup-completing {
    pointer-events: none;
}

.setup-completing .setup-header {
    background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
}

.setup-completing .setup-icon {
    animation: setupSuccess 0.6s ease-out;
}

@keyframes setupSuccess {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* Responsive design for setup */
@media (max-width: 480px) {
    .setup-modal .modal-content {
        width: 95%;
        margin: 2% auto;
    }
    
    .setup-header {
        padding: 20px;
    }
    
    .setup-form {
        padding: 20px;
    }
    
    .setup-row {
        grid-template-columns: 1fr;
        gap: 12px;
    }
    
    .setup-logo {
        flex-direction: column;
        gap: 12px;
    }
}
</style>

<!-- Setup Wizard JavaScript -->
<script>
class SetupWizard {
    constructor() {
        this.modal = document.getElementById('setupWizardModal');
        this.form = document.getElementById('setupForm');
        this.setupEventListeners();
    }

    setupEventListeners() {
        // Form submission
        this.form.addEventListener('submit', (e) => {
            e.preventDefault();
            this.completeSetup();
        });

        // Skip button
        document.getElementById('setupSkipBtn').addEventListener('click', () => {
            this.skipSetup();
        });

        // Prevent modal close by clicking outside during setup
        this.modal.addEventListener('click', (e) => {
            if (e.target === this.modal) {
                e.stopPropagation();
            }
        });
    }

    show() {
        this.modal.style.display = 'block';
        // Focus first input
        setTimeout(() => {
            document.getElementById('setupFirstName').focus();
        }, 100);
    }

    hide() {
        this.modal.style.display = 'none';
    }

    async completeSetup() {
        const formData = new FormData(this.form);
        
        // Validate required fields
        const firstName = document.getElementById('setupFirstName').value.trim();
        const lastName = document.getElementById('setupLastName').value.trim();
        const email = document.getElementById('setupEmail').value.trim();

        if (!firstName || !lastName || !email) {
            this.showError('Please fill in all required fields (marked with *)');
            return;
        }

        if (!this.isValidEmail(email)) {
            this.showError('Please enter a valid email address');
            return;
        }

        // Create profile data
        const profileData = {
            firstName: firstName,
            lastName: lastName,
            email: email,
            phone: document.getElementById('setupPhone').value.trim(),
            extension: document.getElementById('setupExtension').value.trim(),
            department: document.getElementById('setupDepartment').value,
            jobTitle: document.getElementById('setupJobTitle').value.trim(),
            setupDate: new Date().toISOString()
        };

        try {
            // Show completion animation
            this.modal.classList.add('setup-completing');
            
            // Save profile
            await this.saveProfile(profileData);
            
            // Brief delay for animation
            setTimeout(() => {
                this.onSetupComplete(profileData);
            }, 800);

        } catch (error) {
            console.error('Setup error:', error);
            this.showError('Failed to save profile. Please try again.');
            this.modal.classList.remove('setup-completing');
        }
    }

    skipSetup() {
        // Create minimal demo profile
        const demoProfile = {
            firstName: 'Demo',
            lastName: 'User',
            email: 'demo@company.com',
            phone: '(555) 123-4567',
            extension: '',
            department: 'General',
            jobTitle: 'Employee',
            setupDate: new Date().toISOString()
        };

        this.saveProfile(demoProfile);
        this.onSetupComplete(demoProfile, true);
    }

    async saveProfile(profileData) {
        return new Promise((resolve, reject) => {
            try {
                localStorage.setItem('userProfile', JSON.stringify(profileData));
                localStorage.setItem('setupCompleted', 'true');
                resolve();
            } catch (error) {
                reject(error);
            }
        });
    }

    isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    showError(message) {
        // Remove existing error
        const existingError = this.form.querySelector('.setup-error');
        if (existingError) {
            existingError.remove();
        }

        // Add new error
        const errorDiv = document.createElement('div');
        errorDiv.className = 'setup-error';
        errorDiv.style.cssText = `
            background: #f8d7da;
            color: #721c24;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 12px;
            border-left: 4px solid #dc3545;
        `;
        errorDiv.textContent = message;
        
        this.form.insertBefore(errorDiv, this.form.firstChild);

        // Remove error after 5 seconds
        setTimeout(() => {
            if (errorDiv.parentNode) {
                errorDiv.remove();
            }
        }, 5000);
    }

    onSetupComplete(profileData, skipped = false) {
        this.hide();
        
        // Call the main app's setup completion handler
        if (window.appSetupComplete) {
            window.appSetupComplete(profileData, skipped);
        }

        // Show success message
        if (window.showMessage) {
            const message = skipped 
                ? '⚠️ Setup skipped - using demo profile. You can update your information in Settings.'
                : '✅ Profile setup completed! Your information will be automatically included in support tickets.';
            const type = skipped ? 'warning' : 'success';
            window.showMessage(message, type);
        }
    }
}

// Initialize setup wizard when this file is loaded
window.setupWizard = new SetupWizard();
</script>
